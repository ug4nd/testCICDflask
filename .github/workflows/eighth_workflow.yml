name: EighthWorkflow
on:
  workflow_dispatch:
    inputs:
      titleCustom:
        description: Type the title
        type: string
        required: true
        default: "Hello World"

jobs:
  run-first-command:
    runs-on: ubuntu-latest
    steps:
      - name: Display inputs
        run: |
          echo "Title: ${{ inputs.titleCustom }}"
