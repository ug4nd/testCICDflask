name : sixteenthWF
on: push

jobs:
  testing-maxtrix-job:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [12,14,18]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-node@v6
        with:
            node-version: ${{ matrix.node-version }}
      - run: node -v


