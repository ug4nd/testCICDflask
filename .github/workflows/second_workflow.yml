name: SecondWorkflow
on: workflow_dispatch

jobs:
  run-first-command:
    runs-on:  ubuntu-latest
    steps:
      - name: Display Node Version Ubuntu
        run:  node -v
  run-parallel-command:
    runs-on:  windows-latest
    steps:
      - name: Display Node Version Windows
        run:  node -v
  run-second-command:
    runs-on:  macos-latest
    needs:    [run-first-command]
    steps:
      - name: Display Node Version MacOS
        run:  node -v